---
name: "Complex Composite Action"
description: "A comprehensive, valid composite GitHub Action for schema conformance testing."
author: "complex@example.com"
branding:
  icon: "package"
  color: "purple"
inputs:
  config-path:
    description: "Path to configuration file"
    required: true
  verbose:
    description: "Enable verbose logging"
    required: false
    default: "false"
  retries:
    description: "Number of retries"
    required: false
    default: "3"
  custom-env:
    description: "Custom environment variable"
    required: false
outputs:
  result:
    description: "The result of the action"
    value: ${{ steps.set_output.outputs.result }}
  log-path:
    description: "Path to the log file"
    value: ${{ steps.upload_logs.outputs.log_path }}
runs:
  using: "composite"
  steps:
    - name: "Checkout"
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
    - name: "Set up Node.js"
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
      with:
        node-version: "20"
    - name: "Run main script"
      run: |
        node main.js --config "${{ inputs.config-path }}" --retries "${{ inputs.retries }}"
      shell: bash
      env:
        CUSTOM_ENV: "${{ inputs.custom-env }}"
        VERBOSE: "${{ inputs.verbose }}"
    - name: "Upload logs"
      id: upload_logs
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: logs
        path: ./logs/output.log
    - name: "Local helper"
      uses: ./local-action
    - name: "Set output"
      id: set_output
      run: echo "result=success" >> $GITHUB_OUTPUT
      shell: bash
